<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>homelab-ai</title>
<link rel="manifest" href="/static/manifest.json">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root { color-scheme: dark; --safe-bottom: env(safe-area-inset-bottom, 0px); }
  html, body { background: #0b1020; color: #e2e8f0; font-family: ui-sans-serif, system-ui, sans-serif; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  .nav-item.active .nav-icon { color: #818cf8; }
  .nav-item.active .nav-label { color: #c7d2fe; }
  .shimmer { background: linear-gradient(90deg, rgba(30,41,59,0.4) 0%, rgba(51,65,85,0.55) 50%, rgba(30,41,59,0.4) 100%); background-size: 200% 100%; animation: shim 1.4s ease-in-out infinite; }
  @keyframes shim { 0% {background-position: 200% 0;} 100% {background-position: -200% 0;} }
  .chat-msg { word-wrap: break-word; }
  /* Tool-call card — Open WebUI style. */
  .tool-card { background: rgba(99,102,241,0.08); border: 1px solid rgba(99,102,241,0.25); border-radius: 8px; padding: 8px 10px; margin: 4px 0; font-size: 11px; }
  .tool-card .tool-name { color: #c7d2fe; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .tool-card .tool-args { color: #94a3b8; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; word-break: break-all; }
  .tool-card .tool-result { color: #cbd5e1; margin-top: 4px; max-height: 200px; overflow-y: auto; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 10px; white-space: pre-wrap; }
  .form-section { background: rgba(15,23,42,0.55); border: 1px solid rgba(148,163,184,0.18); border-radius: 12px; padding: 12px; margin-bottom: 10px; }
  .form-section h3 { color: #c7d2fe; font-size: 12px; font-weight: 600; margin-bottom: 8px; }
  .form-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
  .form-row label { font-size: 11px; color: #94a3b8; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .form-row input, .form-row select, .form-row textarea { background: rgba(15,23,42,0.7); border: 1px solid rgba(148,163,184,0.25); border-radius: 6px; padding: 6px 8px; font-size: 12px; color: #e2e8f0; }
  .form-row input:focus, .form-row select:focus, .form-row textarea:focus { outline: none; border-color: rgba(99,102,241,0.6); }
  .history-item { background: rgba(15,23,42,0.55); border: 1px solid rgba(148,163,184,0.18); border-radius: 8px; padding: 8px 10px; margin-bottom: 6px; font-size: 11px; cursor: pointer; }
  .history-item:hover { background: rgba(30,41,59,0.7); }
  .history-detail { max-height: 0; overflow: hidden; transition: max-height 0.2s ease; }
  .history-item.expanded .history-detail { max-height: 400px; overflow-y: auto; }
  .history-detail pre { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 10px; color: #cbd5e1; white-space: pre-wrap; padding-top: 8px; }
</style>
</head>
<body class="bg-slate-950 text-slate-100">

<header class="sticky top-0 z-30 bg-slate-950/80 backdrop-blur border-b border-slate-800/50 px-4 py-3 flex items-center justify-between">
  <h1 id="headerTitle" class="text-base font-semibold">homelab-ai</h1>
  <span class="text-xs text-slate-500" id="headerStatus">·</span>
</header>

<main class="pb-20">

  <!-- Home / Dashboard -->
  <div id="tab-home" class="tab-panel active px-4 py-3 space-y-3">
    <div>
      <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Services</h2>
      <div id="serviceGrid" class="grid grid-cols-2 gap-2">
        <div class="shimmer h-16 rounded-xl"></div>
        <div class="shimmer h-16 rounded-xl"></div>
        <div class="shimmer h-16 rounded-xl"></div>
        <div class="shimmer h-16 rounded-xl"></div>
      </div>
    </div>
    <div>
      <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Agent</h2>
      <div id="agentCard" class="p-3 rounded-xl bg-slate-800/60 border border-slate-700/50 text-sm">
        <div class="shimmer h-10 rounded"></div>
      </div>
    </div>
  </div>

  <!-- AI Chat -->
  <div id="tab-chat" class="tab-panel flex flex-col" style="height: calc(100vh - 116px);">
    <div id="chatLog" class="flex-1 overflow-y-auto px-4 py-3 space-y-3">
      <div class="text-xs text-slate-500 text-center py-2">Ask anything about your homelab.</div>
    </div>
    <div class="px-3 py-2 border-t border-slate-800/60 flex gap-2">
      <input id="chatInput" type="text" placeholder="What's broken right now?"
             class="flex-1 bg-slate-800/70 border border-slate-700/60 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500/60"
             onkeydown="if(event.key==='Enter') sendChat()">
      <button onclick="sendChat()" class="px-4 py-2 rounded-lg bg-indigo-500/80 text-white text-sm font-medium">Send</button>
    </div>
  </div>

  <!-- Config (config.yaml editor) -->
  <div id="tab-config" class="tab-panel px-4 py-3 space-y-3">
    <div class="flex items-center justify-between">
      <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Config Editor</h2>
      <button onclick="loadConfig()" class="text-[11px] text-indigo-400 px-2 py-1 rounded hover:bg-slate-800/60">Reload</button>
    </div>
    <p class="text-[11px] text-slate-500">Edits write to <code id="configPath" class="text-slate-400">…</code>. Server restart required to apply.</p>
    <div id="configBody"><div class="shimmer h-20 rounded-xl"></div></div>
    <div class="flex gap-2">
      <button onclick="loadConfig()" class="flex-1 py-2 rounded-lg bg-slate-700/60 text-slate-200 text-sm">Reload</button>
      <button onclick="saveConfig()" class="flex-1 py-2 rounded-lg bg-indigo-500/80 text-white text-sm font-medium">Save</button>
    </div>
    <div id="configStatus" class="text-xs text-slate-500"></div>
  </div>

  <!-- History -->
  <div id="tab-history" class="tab-panel px-4 py-3 space-y-3">
    <div class="flex gap-1 text-xs">
      <button id="histTabScans" class="flex-1 py-2 rounded-lg bg-indigo-500/30 text-indigo-200" onclick="showHistTab('scans')">Scans</button>
      <button id="histTabAi" class="flex-1 py-2 rounded-lg bg-slate-700/60 text-slate-300" onclick="showHistTab('ai')">AI calls</button>
      <button id="histTabFixes" class="flex-1 py-2 rounded-lg bg-slate-700/60 text-slate-300" onclick="showHistTab('fixes')">Fixes</button>
    </div>
    <div id="historyList"><div class="shimmer h-16 rounded-xl"></div></div>
    <div id="historyStatus" class="text-[11px] text-slate-500"></div>
  </div>

  <!-- Settings (user overlay) -->
  <div id="tab-settings" class="tab-panel px-4 py-3 space-y-3">
    <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">User settings</h2>
    <p class="text-xs text-slate-400 mb-3">Overlay preferences. Saved to <code id="settingsPath">./data/settings.yaml</code>.</p>
    <textarea id="settingsEditor" class="w-full h-64 bg-slate-900 border border-slate-700/60 rounded-lg px-3 py-2 text-xs font-mono"
              spellcheck="false"></textarea>
    <div class="flex gap-2 mt-2">
      <button onclick="loadSettings()" class="flex-1 py-2 rounded-lg bg-slate-700/60 text-slate-200 text-sm">Reload</button>
      <button onclick="saveSettings()" class="flex-1 py-2 rounded-lg bg-indigo-500/80 text-white text-sm font-medium">Save</button>
    </div>
    <div id="settingsStatus" class="text-xs text-slate-500 mt-2"></div>
  </div>

</main>

      <span class="nav-label text-[10px] text-slate-500">Chat</span>
    </button>

      <svg class="nav-icon w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"/></svg>
      <span class="nav-label text-[10px] text-slate-500">Config</span>

      <svg class="nav-icon w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>

      <span class="nav-label text-[10px] text-slate-500">Settings</span>

<script>
const API = '';
const API_KEY_STORAGE = 'homelab_ai_api_key';
function $(id){ return document.getElementById(id); }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── auth wrapper for fetch ────────────────────────────────────────────────
const _origFetch = window.fetch.bind(window);
window.fetch = async function(input, init={}) {
  const key = localStorage.getItem(API_KEY_STORAGE);
  if (key) {
    init.headers = init.headers || {};
    if (init.headers instanceof Headers) { init.headers.set('X-Api-Key', key); }
    else { init.headers['X-Api-Key'] = key; }
  }
  init.credentials = init.credentials || 'same-origin';
  const r = await _origFetch(input, init);
  if (r.status === 401) showApiKeyModal();
  return r;
};

function showApiKeyModal() {
  if ($('apiKeyModal')) return;
  const modal = document.createElement('div');
  modal.id = 'apiKeyModal';
  modal.style = 'position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;padding:1rem;';
  modal.innerHTML = `
    <div class="bg-slate-900 border border-slate-700 rounded-xl p-5 max-w-sm w-full">
      <h2 class="text-base font-semibold mb-2">Authentication required</h2>
      <p class="text-xs text-slate-400 mb-3">Paste the API key from your config.yaml — saved locally.</p>
      <input id="apiKeyInput" type="password" placeholder="hk_..."
             class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm mb-3" autofocus>
      <div class="flex gap-2">
        <button onclick="document.getElementById('apiKeyModal').remove()" class="flex-1 py-2 rounded-lg bg-slate-700 text-sm">Cancel</button>
        <button id="saveApiKeyBtn" class="flex-1 py-2 rounded-lg bg-indigo-500 text-white text-sm font-medium">Save</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  $('saveApiKeyBtn').onclick = () => {
    const v = $('apiKeyInput').value.trim();
    if (v) {
      localStorage.setItem(API_KEY_STORAGE, v);
      $('apiKeyModal').remove();
      loadHome();
    }
  };
  $('apiKeyInput').addEventListener('keydown', e => { if (e.key === 'Enter') $('saveApiKeyBtn').click(); });
}

// ── tab switching ────────────────────────────────────────────────────────
function switchTab(tab){
  const tabs = ['home','chat','config','history','settings'];
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  $(`tab-${tab}`).classList.add('active');
  document.querySelectorAll('.nav-item')[tabs.indexOf(tab)].classList.add('active');
  const titles = {home: 'Dashboard', chat: 'AI Chat', config: 'Config', history: 'History', settings: 'Settings'};
  $('headerTitle').textContent = titles[tab] || 'homelab-ai';
  if (tab === 'home') loadHome();
  if (tab === 'config') loadConfig();
  if (tab === 'history') showHistTab(currentHistTab);
  if (tab === 'settings') loadSettings();
}

// ── Home ─────────────────────────────────────────────────────────────────
async function loadHome(){
  try {
    const [overview, agent] = await Promise.all([
      fetch(API+'/api/overview').then(r => r.json()),
      fetch(API+'/api/agent/status').then(r => r.json()),
    ]);
    const entries = Object.entries(overview);
    $('serviceGrid').innerHTML = entries.length
      ? entries.map(([name, h]) => {
          const ok = h.ok;
          return `<div class="p-3 rounded-xl bg-slate-800/60 border border-slate-700/50">
            <div class="flex items-center gap-2">
              <span class="w-2 h-2 rounded-full ${ok ? 'bg-emerald-400' : 'bg-red-400'}"></span>
              <span class="text-sm font-medium">${esc(name)}</span>
            </div>
            <div class="text-[11px] text-slate-400 mt-1 truncate">${esc(h.version || h.error || 'ok')}</div>
          </div>`;
        }).join('')
      : '<div class="col-span-2 text-xs text-slate-500 text-center py-4">No services configured. Edit config.yaml.</div>';
    $('agentCard').innerHTML =
      `Status: <span class="text-${agent.running ? 'emerald' : 'slate'}-300">${agent.running ? 'running' : 'idle'}</span> · `+
      `${agent.open_failures || 0} open issue(s) · interval ${agent.scan_interval}s`;
    $('headerStatus').textContent = agent.running ? `agent ✓` : `agent ·`;
  } catch (e) {
    $('serviceGrid').innerHTML = `<div class="col-span-2 text-xs text-red-300">${esc(String(e))}</div>`;
  }
}

// ── Chat: streaming SSE + tool-call cards ────────────────────────────────
async function sendChat(){
  const input = $('chatInput');
  const prompt = input.value.trim();
  if (!prompt) return;
  input.value = '';
  const log = $('chatLog');
  log.insertAdjacentHTML('beforeend',
    `<div class="chat-msg flex justify-end"><div class="px-3 py-2 rounded-lg bg-indigo-500/30 text-sm max-w-[80%]">${esc(prompt)}</div></div>`);
  // Container for the assistant's response — tool cards stream in, then the answer.
  const respId = 'resp-' + Date.now();
  log.insertAdjacentHTML('beforeend',
    `<div id="${respId}" class="chat-msg flex justify-start">
       <div class="px-3 py-2 rounded-lg bg-slate-800/70 text-sm max-w-[90%]">
         <div id="${respId}-tools" class="space-y-1"></div>
         <div id="${respId}-answer" class="text-slate-400">…</div>
       </div>
     </div>`);
  log.scrollTop = log.scrollHeight;

  // We use fetch + manual SSE parsing because EventSource doesn't support
  // POST + custom headers. The X-Api-Key wrapper above already adds auth.
  try {
    const r = await fetch(API + '/api/ai/agent/stream', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'Accept': 'text/event-stream'},
      body: JSON.stringify({prompt}),
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    while (true) {
      const {value, done} = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, {stream: true});
      let idx;
      while ((idx = buffer.indexOf('\n\n')) >= 0) {
        const event = buffer.slice(0, idx);
        buffer = buffer.slice(idx + 2);
        handleSseEvent(event, respId);
        log.scrollTop = log.scrollHeight;
      }
    }
  } catch (e) {
    $(`${respId}-answer`).innerHTML = `<span class="text-red-300">${esc(String(e))}</span>`;
  }
  log.scrollTop = log.scrollHeight;
}

function handleSseEvent(raw, respId){
  let eventType = '', data = '';
  for (const line of raw.split('\n')) {
    if (line.startsWith('event:')) eventType = line.slice(6).trim();
    else if (line.startsWith('data:')) data += line.slice(5).trim();
  }
  if (!data) return;
  let payload;
  try { payload = JSON.parse(data); } catch { return; }
  if (eventType === 'tool_call') {
    const card = document.createElement('div');
    card.className = 'tool-card';
    const argsText = payload.arguments ? JSON.stringify(payload.arguments) : '{}';
    const resultText = payload.result ? JSON.stringify(payload.result, null, 2) : '';
    card.innerHTML = `
      <div><span class="tool-name">${esc(payload.name)}</span><span class="tool-args"> (${esc(argsText)})</span></div>
      ${resultText ? `<div class="tool-result">${esc(resultText.slice(0, 800))}${resultText.length > 800 ? '…' : ''}</div>` : ''}
    `;
    $(`${respId}-tools`).appendChild(card);
  } else if (eventType === 'answer') {
    $(`${respId}-answer`).className = 'text-sm';
    $(`${respId}-answer`).textContent = payload.answer || '(no answer)';
  }
}

// ── Config tab (live config.yaml editor) ─────────────────────────────────
let _configSchema = null;
let _configCurrent = null;

async function loadConfig(){
  $('configStatus').textContent = 'Loading...';
  try {
    const [schema, current] = await Promise.all([
      fetch(API+'/api/config/schema').then(r => r.ok ? r.json() : Promise.reject(new Error('config_editor feature not enabled'))),
      fetch(API+'/api/config/current').then(r => r.ok ? r.json() : Promise.reject(new Error('config_editor feature not enabled'))),
    ]);
    _configSchema = schema; _configCurrent = current;
    $('configPath').textContent = current.path || 'config.yaml';
    renderConfigForm(schema, current.parsed || {});
    $('configStatus').textContent = '';
  } catch (e) {
    $('configBody').innerHTML = `<div class="p-3 rounded-xl bg-red-500/10 border border-red-500/30 text-xs text-red-300">
      ${esc(String(e))}.<br>Enable <code>features.config_editor.enabled: true</code> in config.yaml.
    </div>`;
    $('configStatus').textContent = '';
  }
}

function _readDottedPath(obj, path){
  return path.split('.').reduce((cur, part) => (cur && typeof cur === 'object') ? cur[part] : undefined, obj);
}
function _setDottedPath(obj, path, value){
  const parts = path.split('.');
  let cur = obj;
  for (let i = 0; i < parts.length - 1; i++) {
    if (typeof cur[parts[i]] !== 'object' || cur[parts[i]] === null) cur[parts[i]] = {};
    cur = cur[parts[i]];
  }
  cur[parts[parts.length - 1]] = value;
}

function renderConfigForm(schema, current){
  const html = [];
  for (const section of schema.sections) {
    const sectionPath = section.name;
    const sectionVal = current[sectionPath] || {};
    html.push(`<div class="form-section" data-section="${esc(sectionPath)}">`);
    html.push(`<h3>${esc(section.description || section.name)}</h3>`);
    for (const f of section.fields) {
      const fullPath = section.name === 'features' ? `features.${f.name}` : `${section.name}.${f.name}`;
      const val = section.name === 'features'
        ? _readDottedPath(current, fullPath)
        : sectionVal[f.name];
      html.push(_renderField(fullPath, f, val));
    }
    html.push(`</div>`);
  }
  $('configBody').innerHTML = html.join('\n');
}

function _renderField(path, f, value){
  const safe = esc(path);
  const v = value === undefined || value === null ? '' : value;
  if (f.type === 'bool') {
    const checked = (v === true || v === 'true' || v === 1) ? 'checked' : '';
    return `<div class="form-row"><label>${esc(f.name)}</label>
      <label class="flex items-center gap-2 text-sm"><input type="checkbox" data-cfg="${safe}" ${checked}>
      <span class="text-slate-400">enabled</span></label></div>`;
  }
  if (f.type === 'enum') {
    return `<div class="form-row"><label>${esc(f.name)}</label>
      <select data-cfg="${safe}">${(f.options||[]).map(o => `<option value="${esc(o)}" ${v===o?'selected':''}>${esc(o)}</option>`).join('')}</select></div>`;
  }
  if (f.type === 'secret') {
    const hint = (typeof v === 'string' && v.startsWith('•')) ? ' (currently set — leave blank to keep)' : '';
    return `<div class="form-row"><label>${esc(f.name)}${hint}</label>
      <input type="password" data-cfg="${safe}" placeholder="${esc(v)}" data-original-set="${typeof v==='string' && v.startsWith('•') ? '1' : ''}"></div>`;
  }
  const type = (f.type === 'integer') ? 'number' : 'text';
  return `<div class="form-row"><label>${esc(f.name)}</label>
    <input type="${type}" data-cfg="${safe}" value="${esc(v)}"></div>`;
}

async function saveConfig(){
  if (!_configSchema || !_configCurrent) { $('configStatus').textContent = 'Load first.'; return; }
  // Build a new parsed object by walking inputs.
  const out = JSON.parse(JSON.stringify(_configCurrent.parsed || {}));
  document.querySelectorAll('#configBody [data-cfg]').forEach(el => {
    const path = el.dataset.cfg;
    let val;
    if (el.type === 'checkbox') val = el.checked;
    else if (el.type === 'number') val = el.value === '' ? undefined : Number(el.value);
    else if (el.type === 'password') {
      // Empty password field for an already-set secret means "keep existing".
      if (!el.value && el.dataset.originalSet === '1') return;
      val = el.value;
    }
    else val = el.value;
    if (val === undefined) return;
    _setDottedPath(out, path, val);
  });

  $('configStatus').textContent = 'Saving...';
  try {
    const r = await fetch(API+'/api/config/save', {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({parsed: out}),
    });
    if (!r.ok) {
      const t = await r.text();
      throw new Error(`HTTP ${r.status}: ${t.slice(0, 200)}`);
    }
    $('configStatus').innerHTML = '<span class="text-emerald-300">Saved. Restart the server for changes to apply.</span>';
  } catch (e) {
    $('configStatus').innerHTML = `<span class="text-red-300">${esc(String(e))}</span>`;
  }
}

// ── History tab ───────────────────────────────────────────────────────────
let currentHistTab = 'scans';
async function showHistTab(which){
  currentHistTab = which;
  for (const k of ['scans','ai','fixes']) {
    const el = $(`histTab${k.charAt(0).toUpperCase()+k.slice(1)}`);
    if (k === which) { el.className = 'flex-1 py-2 rounded-lg bg-indigo-500/30 text-indigo-200'; }
    else { el.className = 'flex-1 py-2 rounded-lg bg-slate-700/60 text-slate-300'; }
  }
  $('historyList').innerHTML = '<div class="shimmer h-16 rounded-xl"></div>';
  $('historyStatus').textContent = '';
  try {
    const path = {scans: '/api/history/scans', ai: '/api/history/ai', fixes: '/api/history/fixes'}[which];
    const r = await fetch(API + path);
    if (r.status === 404) {
      $('historyList').innerHTML = `<div class="p-3 rounded-xl bg-slate-800/40 text-xs text-slate-400">
        History feature is not enabled.<br>Set <code>features.history.enabled: true</code> in config.yaml.</div>`;
      return;
    }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    renderHistory(which, data);
  } catch (e) {
    $('historyList').innerHTML = `<div class="text-xs text-red-300">${esc(String(e))}</div>`;
  }
}

function renderHistory(which, data){
  const list = which === 'scans' ? data.scans : which === 'ai' ? data.ai_calls : data.fixes;
  if (!list || !list.length) {
    $('historyList').innerHTML = `<div class="p-3 rounded-xl bg-slate-800/40 text-xs text-slate-400 text-center">No ${which} recorded yet.</div>`;
    return;
  }
  const html = list.slice(0, 100).map((item, idx) => {
    const ts = new Date((item.ts || 0) * 1000).toLocaleString();
    let summary = '';
    let detail = '';
    if (which === 'scans') {
      const s = item.summary || {};
      summary = `<span class="text-slate-100">${ts}</span> · findings ${s.findings ?? '?'} · fixed ${s.fixed ?? 0} · escalated ${s.escalated ?? 0}`;
      detail = JSON.stringify(s, null, 2);
    } else if (which === 'ai') {
      summary = `<span class="text-slate-100">${ts}</span> · ${esc(item.model || '?')} · ${item.duration_ms ?? 0}ms`;
      detail = `prompt: ${item.prompt || ''}\n\nanswer: ${item.answer || ''}\n\ntool_calls: ${JSON.stringify(item.tool_calls || [], null, 2)}`;
    } else {
      summary = `<span class="text-slate-100">${ts}</span> · ${esc(item.target)} · tier ${item.tier} · <span class="${item.outcome==='ok'?'text-emerald-300':'text-amber-300'}">${esc(item.outcome)}</span>`;
      detail = item.detail || '';
    }
    return `<div class="history-item" onclick="this.classList.toggle('expanded')">
      <div>${summary}</div>
      <div class="history-detail"><pre>${esc(detail)}</pre></div>
    </div>`;
  }).join('');
  $('historyList').innerHTML = html;
  $('historyStatus').textContent = `${list.length} entries`;
}

// ── Settings ──────────────────────────────────────────────────────────────
async function loadSettings(){
  try {
    const r = await fetch(API+'/api/settings');
    const d = await r.json();
    $('settingsEditor').value = JSON.stringify(d, null, 2);
    $('settingsStatus').textContent = 'Loaded.';
  } catch (e) { $('settingsStatus').textContent = 'Error: '+e; }
}

async function saveSettings(){
  let parsed;
  try { parsed = JSON.parse($('settingsEditor').value); }
  catch (e) { $('settingsStatus').textContent = 'Invalid JSON: '+e; return; }
  try {
    const r = await fetch(API+'/api/settings', {
      method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(parsed),
    });
    if (!r.ok) throw new Error('HTTP '+r.status);
    $('settingsStatus').textContent = 'Saved.';
  } catch (e) { $('settingsStatus').textContent = 'Error: '+e; }
}

// ── Boot ──────────────────────────────────────────────────────────────────
loadHome();
setInterval(loadHome, 30000);
</script>
