name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.6.0)"
        required: true

permissions:
  contents: write
  packages: write
  id-token: write    # for PyPI trusted publishing

jobs:
  pypi:
    name: publish wheel + sdist to PyPI
    runs-on: ubuntu-latest
    # PyPI publishing requires a one-time trusted-publisher setup on PyPI's
    # side (Account settings → Publishing → Add pending publisher for
    # `homelab-ai`, pointing at `JeremiahM37/homelab-ai` + `release.yml`).
    # Until that's done the publish step fails — we let the rest of the
    # release proceed anyway so Docker + GitHub Release still happen.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Verify wheel installs cleanly
        run: |
          python -m venv .verify
          .verify/bin/pip install dist/*.whl
          .verify/bin/python -c "import homelab_ai; print('OK', homelab_ai.__version__)"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  docker:
    name: publish Docker image to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Compute tag
        id: tag
        run: |
          REF="${{ inputs.tag || github.ref_name }}"
          echo "version=${REF#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/homelab-ai:${{ steps.tag.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/homelab-ai:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.tag.outputs.version }}
            org.opencontainers.image.licenses=MIT

  github-release:
    name: GitHub release
    runs-on: ubuntu-latest
    needs: [docker]   # Docker is the canonical install path; don't block on PyPI.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Build release notes from CHANGELOG
        id: notes
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VER="${TAG#v}"
          # Pull the section for this version out of CHANGELOG.md if present.
          if [ -f CHANGELOG.md ] && grep -q "## \[$VER\]" CHANGELOG.md; then
            awk -v ver="$VER" '
              /^## \[/{ p=0 }
              $0 ~ "^## \\[" ver "\\]"{ p=1; next }
              p
            ' CHANGELOG.md > release_notes.md
          else
            git log --pretty=format:"- %s" -n 20 > release_notes.md
          fi
          echo "Wrote release notes:"
          cat release_notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          body_path: release_notes.md
          generate_release_notes: false
          fail_on_unmatched_files: false
