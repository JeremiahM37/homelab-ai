name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tests (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mcp]"

      - name: Lint (ruff)
        run: ruff check .

      # Blocking for the packages that are currently mypy-clean:
      # config, features, auth, agent, api. Widen as more packages are fixed.
      - name: Type-check (mypy, blocking — core packages)
        run: >
          mypy --follow-imports=silent
          homelab_ai/config.py homelab_ai/features.py
          homelab_ai/auth homelab_ai/agent homelab_ai/api

      - name: Type-check (mypy, informational — full tree)
        continue-on-error: true
        run: mypy homelab_ai/

      - name: Tests
        run: pytest -v --tb=short

  build:
    name: build wheel
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 14

  docker:
    name: docker build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image (no push)
        run: docker build -t homelab-ai:ci .
      - name: Smoke-test entrypoint
        run: |
          docker run --rm homelab-ai:ci version
